<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A237E">
<title>K.B. Dental — Stock Out Entry</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#EEF2FB;color:#1A2340;min-height:100vh;padding:16px}
  .wrap{max-width:460px;margin:0 auto}
  .card{background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(26,35,126,.10);overflow:hidden}
  .hdr{background:linear-gradient(135deg,#1A237E,#1357A6);color:#fff;padding:20px 22px}
  .hdr h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
  .hdr p{font-size:12px;opacity:.8;margin-top:3px}
  .body{padding:20px 22px}
  label{display:block;font-size:11px;font-weight:700;color:#5A6B8C;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px}
  label:first-child{margin-top:0}
  input,select,textarea{width:100%;padding:12px 13px;border:1.6px solid #DCE3F2;border-radius:10px;font-size:15px;font-family:inherit;outline:none;background:#fff;color:#1A2340}
  input:focus,select:focus,textarea:focus{border-color:#1357A6}
  textarea{min-height:60px;resize:vertical}
  .hint{font-size:11.5px;color:#8A97B4;margin-top:4px}
  .stockpill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;margin-left:6px}
  .ok{background:#E7F6EC;color:#1B7A3D}.low{background:#FFF3E0;color:#B5651D}.out{background:#FDECEC;color:#C62828}
  button{width:100%;margin-top:22px;padding:15px;border:none;border-radius:11px;background:linear-gradient(135deg,#1A237E,#1357A6);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
  button:disabled{opacity:.55;cursor:not-allowed}
  .msg{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:13.5px;font-weight:600;line-height:1.5;display:none}
  .msg.show{display:block}
  .msg.good{background:#E7F6EC;color:#1B7A3D}
  .msg.bad{background:#FDECEC;color:#C62828}
  .loading{text-align:center;color:#8A97B4;font-size:13px;padding:30px 0}
  .foot{text-align:center;font-size:11px;color:#9AA6C2;margin-top:16px}
  .recent{margin-top:18px}
  .recent h2{font-size:11px;font-weight:700;color:#8A97B4;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .rrow{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:8px 0;border-top:1px solid #EEF1F8;color:#4A5876}
  .rrow b{color:#1A2340}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="hdr">
      <h1>📤 Stock Out Entry</h1>
      <p>K.B. Dental Clinic — record an item you have taken out</p>
    </div>
    <div class="body" id="body">
      <div class="loading" id="loading">Loading item list…</div>
      <div id="form" style="display:none">
        <label for="who">Your Name</label>
        <select id="who"><option value="">-- Select your name --</option></select>
        <input id="whoText" style="display:none;margin-top:8px" placeholder="Type your name">

        <label for="item">Item</label>
        <select id="item"><option value="">-- Select item --</option></select>
        <input id="itemText" style="display:none;margin-top:8px" placeholder="Type item name">
        <div class="hint" id="stockHint"></div>

        <label for="qty">Quantity Taken</label>
        <input id="qty" type="number" min="1" step="1" inputmode="numeric" placeholder="e.g. 5">

        <label for="to">Issued To / Purpose <span style="text-transform:none;font-weight:400;color:#9AA6C2">(optional)</span></label>
        <input id="to" placeholder="e.g. OPD room / Dr. Sharma">

        <label for="note">Notes <span style="text-transform:none;font-weight:400;color:#9AA6C2">(optional)</span></label>
        <textarea id="note" placeholder="Any extra detail"></textarea>

        <button id="submit">Submit Stock Out</button>
        <div class="msg" id="msg"></div>

        <div class="recent" id="recentWrap" style="display:none">
          <h2>Your recent entries</h2>
          <div id="recent"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="foot">Entries are saved to the clinic's Google Sheet · Stock is adjusted by the store in-charge</div>
</div>

<script>
// ─── Config (same backend + security key the main app uses) ──────────────
var INV_BACKEND_URL  = 'https://script.google.com/macros/s/AKfycbw5XgC4jJWR3W7fdyLFKYYkd3fZyIeL3xbfzfSy3f_nmuOKLhP0rYjwLq_9ttQ8tjxRrA/exec';
var MAIN_BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxfxWxPM4kk4Fa242Ewj2T9ktPsn3irBZjAxhWHCaEZkA0CG1ULBZED7PZWVD22cyDO/exec';
var API_TOKEN = 'kbdc-live-g01_zGKPi54vzk2zzKey7UST';
var OUT_SHEET = 'StaffStockOut';

// Content-Type MUST be text/plain — application/json triggers a CORS preflight
// that Apps Script Web Apps don't answer, which blocks the request.
function api(url, action, payload){
  var body = Object.assign({ action: action, token: API_TOKEN }, payload || {});
  return fetch(url, { method:'POST', headers:{ 'Content-Type':'text/plain;charset=utf-8' }, body: JSON.stringify(body) })
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); });
}
function esc(v){ return String(v==null?'':v); }
function byId(id){ return document.getElementById(id); }

var ITEMS = [], STAFF = [], MYRECENT = [];

function stockClass(s){ if(s<=0) return 'out'; if(s<=5) return 'low'; return 'ok'; }

function fillItems(){
  var sel = byId('item');
  ITEMS.forEach(function(it){
    var o = document.createElement('option');
    o.value = it.name; o.textContent = it.name + '  (stock: ' + it.stock + ')';
    sel.appendChild(o);
  });
  if(!ITEMS.length){ // no items loaded — let them type
    sel.style.display='none'; byId('itemText').style.display='block';
  }
}
function fillStaff(){
  var sel = byId('who');
  STAFF.forEach(function(n){
    var o = document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o);
  });
  if(!STAFF.length){ sel.style.display='none'; byId('whoText').style.display='block'; }
}

byId('item').addEventListener('change', function(){
  var it = ITEMS.find(function(x){ return x.name===byId('item').value; });
  var h = byId('stockHint');
  if(it){ h.innerHTML = 'Current stock: <span class="stockpill '+stockClass(it.stock)+'">'+it.stock+' '+(it.uom||'')+'</span>'; }
  else { h.textContent=''; }
});

function currentName(){ return (byId('who').style.display==='none') ? byId('whoText').value.trim() : byId('who').value; }
function currentItem(){ return (byId('item').style.display==='none') ? byId('itemText').value.trim() : byId('item').value; }

function showMsg(text, good){
  var m = byId('msg'); m.textContent = text; m.className = 'msg show ' + (good?'good':'bad');
}

function renderRecent(){
  if(!MYRECENT.length) return;
  var w = byId('recentWrap'); w.style.display='block';
  byId('recent').innerHTML = MYRECENT.slice(0,5).map(function(r){
    var d=''; try{ d=new Date(r.date).toLocaleDateString('en-IN'); }catch(e){}
    return '<div class="rrow"><span><b>'+esc(r.item)+'</b> × '+esc(r.qty)+'</span><span>'+d+'</span></div>';
  }).join('');
}

function submit(){
  var name = currentName(), item = currentItem(), qty = parseInt(byId('qty').value,10);
  if(!name){ showMsg('Please select or enter your name.', false); return; }
  if(!item){ showMsg('Please select or enter the item.', false); return; }
  if(!qty || qty<1){ showMsg('Please enter a valid quantity.', false); return; }

  var btn = byId('submit'); btn.disabled=true; btn.textContent='Saving…';
  var itObj = ITEMS.find(function(x){ return x.name===item; }) || {};
  var row = {
    id: 'SO'+Date.now()+Math.random().toString(36).slice(2,6),
    date: new Date().toISOString(),
    staffName: name,
    item: item,
    cat: itObj.cat || '',
    qty: qty,
    uom: itObj.uom || '',
    issuedTo: byId('to').value.trim(),
    note: byId('note').value.trim(),
    status: 'Submitted'
  };
  // Read-modify-write the register tab so we append without wiping existing rows.
  api(INV_BACKEND_URL, 'getData', { sheet: OUT_SHEET }).then(function(res){
    var rows = (res && res.rows) ? res.rows : [];
    rows.unshift(row);
    return api(INV_BACKEND_URL, 'saveAll', { sheet: OUT_SHEET, rows: rows });
  }).then(function(){
    showMsg('✅ Recorded: '+qty+' × '+item+'. Thank you, '+name+'!', true);
    MYRECENT.unshift(row); renderRecent();
    byId('qty').value=''; byId('to').value=''; byId('note').value='';
    byId('stockHint').textContent='';
    if(byId('item').style.display!=='none') byId('item').value='';
    else byId('itemText').value='';
    btn.disabled=false; btn.textContent='Submit Stock Out';
  }).catch(function(e){
    showMsg('⚠ Could not save: '+e.message+'. Please check your connection and try again.', false);
    btn.disabled=false; btn.textContent='Submit Stock Out';
  });
}

// ─── Load ───────────────────────────────────────────────────────────────
Promise.all([
  api(INV_BACKEND_URL, 'getData', { sheet:'InventoryItems' }).then(function(r){ return (r&&r.rows)||[]; }).catch(function(){ return []; }),
  api(MAIN_BACKEND_URL, 'getData', { sheet:'Staff' }).then(function(r){ return (r&&r.rows)||[]; }).catch(function(){ return []; })
]).then(function(out){
  ITEMS = (out[0]||[]).map(function(r){ return { name:String(r.name||''), cat:String(r.cat||''), uom:String(r.uom||''), stock:Number(r.stock)||0 }; }).filter(function(x){ return x.name; });
  STAFF = (out[1]||[]).map(function(r){ return String(r.name||''); }).filter(Boolean).sort();
  fillItems(); fillStaff();
  byId('loading').style.display='none'; byId('form').style.display='block';
  byId('submit').addEventListener('click', submit);
}).catch(function(e){
  byId('loading').textContent = 'Could not load. Please refresh. ('+e.message+')';
});
</script>
</body>
</html>
